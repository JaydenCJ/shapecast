<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13" xml:space="preserve">
  <rect x="0" y="0" width="820" height="420" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="820" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="820" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="410" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">shapecast — schema plus evidence from example payloads</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> shapecast report api-log.jsonl</text>
  <text x="20" y="80" fill="#8b93a7">FIELD          TYPES                     SEEN  PRESENT  NULL%  FORMAT     NOTES</text>
  <text x="20" y="98" fill="#c8ceda">$.event_id     string(500)               500   100%     0%     <tspan fill="#61afef">uuid</tspan>       -</text>
  <text x="20" y="116" fill="#c8ceda">$.type         string(500)               500   100%     0%     -          <tspan fill="#98c379">enum(3)</tspan></text>
  <text x="20" y="134" fill="#c8ceda">$.created_at   string(500)               500   100%     0%     <tspan fill="#61afef">date-time</tspan>  -</text>
  <text x="20" y="152" fill="#c8ceda">$.order.total  integer(212)|number(288)  500   100%     0%     -          <tspan fill="#febc2e">widened int-&gt;number</tspan></text>
  <text x="20" y="170" fill="#c8ceda">$.coupon       string(219)               500   100%     <tspan fill="#febc2e">56.2%</tspan>  -          -</text>
  <text x="20" y="188" fill="#c8ceda">$.source       string(488)|object(12)    500   100%     0%     -          <tspan fill="#e06c75">conflict: string|object</tspan></text>
  <text x="20" y="206" fill="#c8ceda">$.legacy_ref   string(37)                37    <tspan fill="#febc2e">7.4%</tspan>     0%     -          -</text>
  <text x="20" y="230" fill="#8b93a7">500 samples, 20 fields, 1 optional, 1 conflict</text>

  <text x="20" y="262" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> shapecast infer api-log.jsonl &gt; schema.json   <tspan fill="#5c6370"># draft 2020-12</tspan></text>
  <text x="20" y="282" fill="#c8ceda">"coupon": { "type": [<tspan fill="#98c379">"string"</tspan>, <tspan fill="#98c379">"null"</tspan>] },</text>
  <text x="20" y="300" fill="#c8ceda">"created_at": { "type": <tspan fill="#98c379">"string"</tspan>, "format": <tspan fill="#61afef">"date-time"</tspan> },</text>
  <text x="20" y="318" fill="#c8ceda">"type": { "enum": [<tspan fill="#98c379">"order.cancelled"</tspan>, <tspan fill="#98c379">"order.created"</tspan>, <tspan fill="#98c379">"order.paid"</tspan>] }</text>

  <text x="20" y="350" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> shapecast report --fail-on-conflict api-log.jsonl   <tspan fill="#5c6370"># CI gate</tspan></text>
  <text x="20" y="370" fill="#e06c75">shapecast: 1 conflicted field (--fail-on-conflict)</text>
  <text x="20" y="390" fill="#8b93a7">exit status 1</text>
</svg>
